<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 300" width="840" height="300" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace" role="img" aria-label="faizan@github terminal">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#0a0d12"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- window body -->
  <rect x="8" y="8" width="824" height="284" rx="12" fill="url(#bg)" stroke="#30363d" stroke-width="1" filter="url(#shadow)"/>

  <!-- title bar -->
  <path d="M8 20 a12 12 0 0 1 12 -12 h800 a12 12 0 0 1 12 12 v20 h-824 z" fill="#161b22"/>
  <line x1="8" y1="40" x2="832" y2="40" stroke="#30363d" stroke-width="1"/>
  <!-- traffic lights -->
  <circle cx="30" cy="24" r="6" fill="#ff5f56"/>
  <circle cx="50" cy="24" r="6" fill="#ffbd2e"/>
  <circle cx="70" cy="24" r="6" fill="#27c93f"/>
  <!-- title -->
  <text x="420" y="28" text-anchor="middle" font-size="13" fill="#8b949e">faizan@github: ~/profile</text>

  <!-- body -->
  <g font-size="16">
    <!-- line 1: whoami -->
    <text x="32" y="82">
      <tspan fill="#27c93f">faizan@github</tspan><tspan fill="#8b949e">:</tspan><tspan fill="#58a6ff">~</tspan><tspan fill="#8b949e"> $ </tspan><tspan fill="#e6edf3">whoami</tspan>
    </text>
    <text x="32" y="110" fill="#c9d1d9">Faizan Ali <tspan fill="#6e7681">—</tspan> Full Stack Developer <tspan fill="#6e7681">·</tspan> Bengaluru, India</text>

    <!-- line 2: cat interests -->
    <text x="32" y="150">
      <tspan fill="#27c93f">faizan@github</tspan><tspan fill="#8b949e">:</tspan><tspan fill="#58a6ff">~</tspan><tspan fill="#8b949e"> $ </tspan><tspan fill="#e6edf3">cat </tspan><tspan fill="#a5d6ff">interests.txt</tspan>
    </text>
    <text x="32" y="178" fill="#c9d1d9">web dev <tspan fill="#6e7681">·</tspan> systems design <tspan fill="#6e7681">·</tspan> competitive programming <tspan fill="#6e7681">·</tspan> anime</text>

    <!-- line 3: currently -->
    <text x="32" y="218">
      <tspan fill="#27c93f">faizan@github</tspan><tspan fill="#8b949e">:</tspan><tspan fill="#58a6ff">~</tspan><tspan fill="#8b949e"> $ </tspan><tspan fill="#e6edf3">echo </tspan><tspan fill="#a5d6ff">$STATUS</tspan>
    </text>
    <text x="32" y="246" fill="#c9d1d9">shipping with LLMs wired into real workflows <tspan fill="#6e7681">·</tspan> fundamentals sharp</text>

    <!-- prompt + blinking cursor -->
    <text x="32" y="282">
      <tspan fill="#27c93f">faizan@github</tspan><tspan fill="#8b949e">:</tspan><tspan fill="#58a6ff">~</tspan><tspan fill="#8b949e"> $ </tspan>
    </text>
    <rect x="150" y="270" width="9" height="16" fill="#27c93f">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
